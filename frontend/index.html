<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Battery Debugger — Dashboard</title>
<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
<div class="container">
  <header>
    <h1>Battery Debugger</h1>
    <p>Dashboard de curvas de descarga</p>
  </header>

  <div class="layout">
    <div class="card">
      <h2>Tests</h2>
      <ul class="test-list" id="testList"></ul>
      <p class="empty-message" id="emptyMessage" style="display:none">No hay tests registrados todavía.</p>
    </div>

    <div class="card">
      <h2>Comparación de curvas <span class="hint">tensión vs. tiempo</span></h2>
      <div class="chart-wrap">
        <canvas id="compareChart"></canvas>
      </div>
      <div class="metadata-row" id="compareTags"></div>
    </div>
  </div>

  <div class="card" id="capacityCard">
    <h2>Decaimiento de capacidad <span class="hint">capacidad estimada vs. edad de la batería</span></h2>
    <div class="tabs" id="capacityTabs"></div>
    <div class="tabs" id="capacityUnitTabs">
      <button class="active" data-unit="ah">Ah</button>
      <button data-unit="pct">%</button>
    </div>
    <div class="chart-wrap">
      <canvas id="capacityChart"></canvas>
    </div>
  </div>
</div>

<script src="scripts.js"></script>
</body>
</html>
